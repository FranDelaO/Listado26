<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0f1115">
<title>Setlist — Gestor de Canciones</title>
<style>
  :root {
    --bg: #0f1115;
    --bg-elevated: #1a1d24;
    --bg-hover: #222630;
    --border: #2a2e38;
    --text: #e8e8ed;
    --text-muted: #8b8d97;
    --accent: #f59e0b;
    --accent-hover: #fbbf24;
    --danger: #ef4444;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --green: #10b981;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .logo-icon { color: var(--accent); font-size: 26px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* Indicador de sync */
  .sync-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 20px;
  }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .sync-status.live .sync-dot { background: var(--green); animation: pulse 2s infinite; }
  .sync-status.loading .sync-dot { background: var(--accent); animation: pulse 1s infinite; }
  .sync-status.error .sync-dot { background: var(--danger); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .user-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px 6px 6px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
  }
  .user-chip img { width: 22px; height: 22px; border-radius: 50%; }
  .user-chip.admin { border-color: var(--accent); color: var(--accent); }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 14px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    font-family: inherit;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-input, .form-select-filter {
    padding: 12px 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
  }
  .search-input { flex: 1; min-width: 180px; }
  .form-select-filter { min-width: 160px; cursor: pointer; }
  .search-input:focus, .form-select-filter:focus { outline: none; border-color: var(--accent); }
  .btn {
    padding: 12px 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
    min-height: 44px;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--bg-elevated); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--bg-hover); }
  .btn-icon {
    padding: 10px 12px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid transparent;
    cursor: pointer;
    border-radius: 6px;
    font-size: 15px;
    min-width: 40px;
    min-height: 40px;
  }
  .btn-icon:hover { background: var(--bg-hover); color: var(--text); }
  .btn-login {
    padding: 8px 14px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-login:hover { color: var(--text); border-color: var(--text-muted); }

  /* Agrupación */
  .day-group { margin-bottom: 24px; }
  .day-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, rgba(245,158,11,0.12) 0%, transparent 100%);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
  }
  .day-header.rehearsal {
    background: linear-gradient(90deg, rgba(96,165,250,0.12) 0%, transparent 100%);
    border-left-color: var(--blue);
  }
  .day-header.singer {
    background: linear-gradient(90deg, rgba(167,139,250,0.12) 0%, transparent 100%);
    border-left-color: var(--purple);
  }
  .day-header.neutral {
    background: rgba(139,141,151,0.08);
    border-left-color: var(--text-muted);
  }
  .day-title { font-size: 15px; font-weight: 600; text-transform: capitalize; }
  .day-title.nocaps { text-transform: none; }
  .day-count {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg-hover);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .songs-grid { display: grid; gap: 10px; }
  .song-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    transition: border-color 0.15s;
  }
  .song-card:hover { border-color: var(--accent); }
  .song-info h3 { font-size: 16px; margin-bottom: 4px; font-weight: 600; }
  .song-artist { color: var(--text-muted); font-size: 13px; margin-bottom: 8px; }
  .song-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 12px; }
  .meta-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    background: var(--bg-hover);
    border-radius: 6px;
    color: var(--text-muted);
  }
  .meta-badge.performance { color: var(--accent); background: rgba(245,158,11,0.1); }
  .meta-badge.rehearsal { color: var(--blue); background: rgba(96,165,250,0.1); }
  .meta-badge.singer { color: var(--purple); background: rgba(167,139,250,0.12); font-weight: 500; }
  .song-actions { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 12px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-elevated);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 640px;
    max-height: 92vh;
    overflow-y: auto;
    border: 1px solid var(--border);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    gap: 12px;
  }
  .modal-title { font-size: 20px; font-weight: 600; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-muted); }
  .form-input, .form-textarea {
    width: 100%;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
  }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
  .form-textarea { min-height: 200px; resize: vertical; line-height: 1.7; }
  .form-textarea.mono {
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.8;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }

  /* Tabs dentro del modal de letra/acordes */
  .view-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .view-tab {
    padding: 8px 14px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-family: inherit;
  }
  .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .lyrics-content {
    white-space: pre-wrap;
    line-height: 1.9;
    font-size: 16px;
    padding: 16px;
    background: var(--bg);
    border-radius: var(--radius);
    max-height: 55vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    -webkit-overflow-scrolling: touch;
  }
  .lyrics-content.mono {
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.8;
    white-space: pre;
    overflow-x: auto;
  }

  /* MODO PANTALLA COMPLETA PARA LETRAS */
  .fullscreen-viewer {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: none;
    flex-direction: column;
  }
  .fullscreen-viewer.active { display: flex; }
  .fullscreen-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    flex-shrink: 0;
  }
  .fs-title-group { flex: 1; min-width: 0; }
  .fs-title {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fs-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fs-controls { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .fs-font-btn {
    padding: 6px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    min-width: 36px;
  }
  .fs-font-btn:hover { background: var(--bg-hover); }
  .fs-view-toggle {
    display: flex;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .fs-view-toggle button {
    padding: 6px 12px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .fs-view-toggle button.active { background: var(--accent); color: #000; font-weight: 600; }
  .fs-close {
    padding: 8px 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    font-family: inherit;
    min-height: 36px;
  }
  .fullscreen-content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px 20px 60px;
    white-space: pre-wrap;
    line-height: 1.9;
    font-size: 20px;
  }
  .fullscreen-content.mono {
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    line-height: 1.9;
    white-space: pre;
    overflow-x: auto;
  }
  .fullscreen-empty {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 20px;
    font-style: italic;
    font-size: 16px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

  .config-warning {
    background: rgba(239,68,68,0.1);
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    padding: 20px;
    margin: 20px 0;
    color: var(--text);
  }
  .config-warning h3 { margin-bottom: 8px; color: var(--danger); }
  .config-warning code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .container { padding: 14px; }
    .song-card { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .song-actions { justify-content: flex-end; }
    .logo { font-size: 20px; }
    .header-actions { gap: 6px; }
    .sync-status span:not(.sync-dot) { display: none; }
    .sync-status { padding: 6px; }
    .tab { padding: 10px 12px; font-size: 13px; }
    .modal { padding: 16px; border-radius: 14px 14px 0 0; max-height: 95vh; }
    .modal-overlay { align-items: flex-end; padding: 0; }
    .lyrics-content { font-size: 17px; max-height: 60vh; }
    .fullscreen-content { font-size: 19px; padding: 20px 16px 60px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <span class="logo-icon">🎵</span>
      <span>Setlist</span>
    </div>
    <div class="header-actions">
      <div class="sync-status loading" id="syncStatus">
        <span class="sync-dot"></span>
        <span id="syncText">Conectando...</span>
      </div>
      <div id="authArea"></div>
    </div>
  </header>

  <div id="configWarning" style="display:none"></div>

  <div class="tabs">
    <button class="tab active" data-filter="all">🎼 Todas</button>
    <button class="tab" data-filter="performance">🎤 Por día de toque</button>
    <button class="tab" data-filter="rehearsal">🎹 Por día de ensayo</button>
    <button class="tab" data-filter="singer">🎙️ Por cantante</button>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="Buscar por título, artista o cantante...">
    <select class="form-select-filter" id="singerFilter">
      <option value="">Todos los cantantes</option>
    </select>
    <button class="btn btn-primary" id="newSongBtn" style="display:none" onclick="openSongModal()">+ Nueva Canción</button>
  </div>

  <div id="songsList"></div>
</div>

<!-- Modal formulario -->
<div class="modal-overlay" id="songModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Nueva Canción</div>
      <button class="btn-icon" onclick="closeSongModal()">✕</button>
    </div>
    <form id="songForm" onsubmit="saveSong(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Título *</label>
          <input type="text" class="form-input" name="title" required>
        </div>
        <div class="form-group">
          <label class="form-label">Artista original</label>
          <input type="text" class="form-input" name="artist">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">🎙️ Cantante (quién la interpretará)</label>
        <input type="text" class="form-input" name="singer" list="singersList" placeholder="Ej: Francisco, María, Coro...">
        <datalist id="singersList"></datalist>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">🎤 Día de toque</label>
          <input type="date" class="form-input" name="performanceDate">
        </div>
        <div class="form-group">
          <label class="form-label">🎹 Día de ensayo</label>
          <input type="date" class="form-input" name="rehearsalDate">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">URL de reproducción (YouTube, Spotify, etc.)</label>
        <input type="url" class="form-input" name="playUrl" placeholder="https://...">
      </div>
      <div class="form-group">
        <label class="form-label">Tonalidad / Notas</label>
        <input type="text" class="form-input" name="notes" placeholder="Ej: Am, Capo 2, BPM 120">
      </div>
      <div class="form-group">
        <label class="form-label">Letra</label>
        <textarea class="form-textarea" name="lyrics" placeholder="Pega aquí la letra de la canción..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">🎸 Acordes</label>
        <textarea class="form-textarea mono" name="chords" placeholder="Ej:&#10;       Am            G&#10;Caminando por la calle...&#10;       F             E&#10;vi tus ojos otra vez..."></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="closeSongModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary">💾 Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal letra/acordes -->
<div class="modal-overlay" id="lyricsModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="lyricsTitle"></div>
        <div style="color: var(--text-muted); font-size: 14px; margin-top: 2px;" id="lyricsArtist"></div>
      </div>
      <button class="btn-icon" onclick="closeLyricsModal()">✕</button>
    </div>
    <div id="lyricsNotes" style="margin-bottom: 12px; color: var(--accent); font-size: 14px;"></div>

    <div class="view-tabs" id="viewTabs">
      <button class="view-tab active" data-view="lyrics">📄 Letra</button>
      <button class="view-tab" data-view="chords">🎸 Acordes</button>
    </div>

    <div class="lyrics-content" id="lyricsContent"></div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeLyricsModal()">Cerrar</button>
      <button class="btn btn-secondary" onclick="openFullscreen()">⛶ Pantalla completa</button>
      <button class="btn btn-primary" id="lyricsPlayBtn">▶ Reproducir</button>
    </div>
  </div>
</div>

<!-- Vista pantalla completa -->
<div class="fullscreen-viewer" id="fullscreenViewer">
  <div class="fullscreen-header">
    <div class="fs-title-group">
      <div class="fs-title" id="fsTitle"></div>
      <div class="fs-subtitle" id="fsSubtitle"></div>
    </div>
    <div class="fs-controls">
      <div class="fs-view-toggle" id="fsViewToggle">
        <button class="active" data-view="lyrics">📄</button>
        <button data-view="chords">🎸</button>
      </div>
      <button class="fs-font-btn" onclick="changeFontSize(-2)" title="Reducir texto">A−</button>
      <button class="fs-font-btn" onclick="changeFontSize(2)" title="Aumentar texto">A+</button>
      <button class="fs-close" onclick="closeFullscreen()" title="Cerrar">✕</button>
    </div>
  </div>
  <div class="fullscreen-content" id="fullscreenContent"></div>
</div>

<script type="module">

let currentModalView = 'lyrics';
let currentFsView = 'lyrics';
let fsFontSize = 20;
let wakeLock = null;

const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const formatDate = (d) => {
  if (!d) return '—';
  const date = new Date(d + 'T00:00:00');
  return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
};

const formatDateFull = (d) => {
  if (!d) return 'Sin fecha';
  const date = new Date(d + 'T00:00:00');
  return date.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
};

// Auth
onAuthStateChanged(auth, (user) => {
  currentUser = user;
  isAdmin = user && user.email === ADMIN_EMAIL;
  renderAuthArea();
  renderSongs();
});

window.login = async () => {
  try { await signInWithPopup(auth, provider); }
  catch (err) { alert('Error al iniciar sesión: ' + err.message); }
};
window.logout = () => signOut(auth);

function renderAuthArea() {
  const area = document.getElementById('authArea');
  const newBtn = document.getElementById('newSongBtn');
  if (!currentUser) {
    area.innerHTML = `<button class="btn-login" onclick="login()">Iniciar sesión</button>`;
    newBtn.style.display = 'none';
    return;
  }
  const photoHtml = currentUser.photoURL
    ? `<img src="${escapeHtml(currentUser.photoURL)}" alt="">`
    : `<span style="font-size:16px;padding:0 4px">👤</span>`;
  const name = currentUser.displayName || currentUser.email;
  const cls = isAdmin ? 'user-chip admin' : 'user-chip';
  area.innerHTML = `
    <div class="${cls}" onclick="logout()" title="Cerrar sesión">
      ${photoHtml}
      <span>${escapeHtml(name.split(' ')[0])}</span>
      ${isAdmin ? '<span style="font-size:11px">⭐</span>' : ''}
    </div>`;
  newBtn.style.display = isAdmin ? '' : 'none';
}

// Firestore
const songsQuery = query(collection(db, "songs"), orderBy("createdAt", "desc"));
onSnapshot(songsQuery, (snap) => {
  songs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  setSyncStatus('live', 'En vivo');
  updateSingers();
  renderSongs();
}, (err) => {
  console.error(err);
  setSyncStatus('error', 'Error de conexión');
});

function setSyncStatus(state, text) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + state;
  document.getElementById('syncText').textContent = text;
}

function updateSingers() {
  const singers = [...new Set(songs.map(s => s.singer).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es'));
  const datalist = document.getElementById('singersList');
  const select = document.getElementById('singerFilter');
  const currentVal = select.value;
  datalist.innerHTML = singers.map(s => `<option value="${escapeHtml(s)}">`).join('');
  select.innerHTML = '<option value="">Todos los cantantes</option>' +
    singers.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
  if (singers.includes(currentVal)) select.value = currentVal;
}

function renderSongs() {
  const container = document.getElementById('songsList');
  const term = document.getElementById('searchInput').value.toLowerCase();
  const singerFilter = document.getElementById('singerFilter').value;

  let filtered = songs.filter(s => {
    const match = !term ||
      (s.title || '').toLowerCase().includes(term) ||
      (s.artist || '').toLowerCase().includes(term) ||
      (s.singer || '').toLowerCase().includes(term);
    const singerMatch = !singerFilter || s.singer === singerFilter;
    return match && singerMatch;
  });

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🎸</div>
        <p>${songs.length === 0 ? (isAdmin ? 'Aún no hay canciones. ¡Agrega la primera!' : 'El setlist está vacío.') : 'No se encontraron canciones con ese criterio.'}</p>
      </div>`;
    return;
  }

  if (currentFilter === 'performance' || currentFilter === 'rehearsal') {
    const key = currentFilter === 'performance' ? 'performanceDate' : 'rehearsalDate';
    const withDate = filtered.filter(s => s[key]);
    const noDate = filtered.filter(s => !s[key]);
    const groups = {};
    withDate.forEach(s => { (groups[s[key]] = groups[s[key]] || []).push(s); });
    const sortedDates = Object.keys(groups).sort();
    const cls = currentFilter === 'rehearsal' ? 'rehearsal' : '';
    const icon = currentFilter === 'rehearsal' ? '🎹' : '🎤';

    let html = sortedDates.map(date => `
      <div class="day-group">
        <div class="day-header ${cls}">
          <span style="font-size: 18px;">${icon}</span>
          <span class="day-title">${formatDateFull(date)}</span>
          <span class="day-count">${groups[date].length} canción${groups[date].length !== 1 ? 'es' : ''}</span>
        </div>
        <div class="songs-grid">${groups[date].map(renderCard).join('')}</div>
      </div>`).join('');

    if (noDate.length > 0) {
      html += `
        <div class="day-group">
          <div class="day-header neutral">
            <span style="font-size: 18px;">📋</span>
            <span class="day-title">Sin fecha asignada</span>
            <span class="day-count">${noDate.length}</span>
          </div>
          <div class="songs-grid">${noDate.map(renderCard).join('')}</div>
        </div>`;
    }
    container.innerHTML = html || `<div class="empty-state"><div class="empty-state-icon">📅</div><p>No hay canciones con fechas asignadas.</p></div>`;
    return;
  }

  if (currentFilter === 'singer') {
    const withSinger = filtered.filter(s => s.singer);
    const noSinger = filtered.filter(s => !s.singer);
    const groups = {};
    withSinger.forEach(s => { (groups[s.singer] = groups[s.singer] || []).push(s); });
    const sortedSingers = Object.keys(groups).sort((a, b) => a.localeCompare(b, 'es'));

    let html = sortedSingers.map(singer => `
      <div class="day-group">
        <div class="day-header singer">
          <span style="font-size: 18px;">🎙️</span>
          <span class="day-title nocaps">${escapeHtml(singer)}</span>
          <span class="day-count">${groups[singer].length} canción${groups[singer].length !== 1 ? 'es' : ''}</span>
        </div>
        <div class="songs-grid">${groups[singer].map(renderCard).join('')}</div>
      </div>`).join('');

    if (noSinger.length > 0) {
      html += `
        <div class="day-group">
          <div class="day-header neutral">
            <span style="font-size: 18px;">❓</span>
            <span class="day-title">Sin cantante asignado</span>
            <span class="day-count">${noSinger.length}</span>
          </div>
          <div class="songs-grid">${noSinger.map(renderCard).join('')}</div>
        </div>`;
    }
    container.innerHTML = html || `<div class="empty-state"><div class="empty-state-icon">🎙️</div><p>No hay cantantes asignados aún.</p></div>`;
    return;
  }

  container.innerHTML = `<div class="songs-grid">${filtered.map(renderCard).join('')}</div>`;
}

function renderCard(s) {
  const adminActions = isAdmin ? `
    <button class="btn-icon" onclick="editSong('${s.id}')" title="Editar">✏️</button>
    <button class="btn-icon" onclick="deleteSong('${s.id}')" title="Eliminar">🗑️</button>
  ` : '';
  const hasContent = s.lyrics || s.chords;
  return `
    <div class="song-card">
      <div class="song-info">
        <h3>${escapeHtml(s.title)}</h3>
        ${s.artist ? `<div class="song-artist">${escapeHtml(s.artist)}</div>` : ''}
        <div class="song-meta">
          ${s.singer ? `<span class="meta-badge singer">🎙️ ${escapeHtml(s.singer)}</span>` : ''}
          ${s.performanceDate ? `<span class="meta-badge performance">🎤 ${formatDate(s.performanceDate)}</span>` : ''}
          ${s.rehearsalDate ? `<span class="meta-badge rehearsal">🎹 ${formatDate(s.rehearsalDate)}</span>` : ''}
          ${s.notes ? `<span class="meta-badge">🎵 ${escapeHtml(s.notes)}</span>` : ''}
        </div>
      </div>
      <div class="song-actions">
        ${hasContent ? `<button class="btn btn-secondary" onclick="viewLyrics('${s.id}')">📄 Letra${s.chords ? ' / Acordes' : ''}</button>` : ''}
        ${s.playUrl ? `<button class="btn btn-primary" onclick="playUrl('${escapeHtml(s.playUrl)}')">▶</button>` : ''}
        ${adminActions}
      </div>
    </div>`;
}

// ===== Modales de edición =====
window.openSongModal = (song = null) => {
  if (!isAdmin) return;
  editingId = song ? song.id : null;
  document.getElementById('modalTitle').textContent = song ? 'Editar Canción' : 'Nueva Canción';
  const form = document.getElementById('songForm');
  form.reset();
  updateSingers();
  if (song) {
    form.title.value = song.title || '';
    form.artist.value = song.artist || '';
    form.singer.value = song.singer || '';
    form.performanceDate.value = song.performanceDate || '';
    form.rehearsalDate.value = song.rehearsalDate || '';
    form.playUrl.value = song.playUrl || '';
    form.notes.value = song.notes || '';
    form.lyrics.value = song.lyrics || '';
    form.chords.value = song.chords || '';
  }
  document.getElementById('songModal').classList.add('active');
};

window.closeSongModal = () => {
  document.getElementById('songModal').classList.remove('active');
  editingId = null;
};

window.saveSong = async (e) => {
  e.preventDefault();
  if (!isAdmin) return;
  const form = e.target;
  const data = {
    title: form.title.value.trim(),
    artist: form.artist.value.trim(),
    singer: form.singer.value.trim(),
    performanceDate: form.performanceDate.value,
    rehearsalDate: form.rehearsalDate.value,
    playUrl: form.playUrl.value.trim(),
    notes: form.notes.value.trim(),
    lyrics: form.lyrics.value,
    chords: form.chords.value,
    updatedAt: serverTimestamp()
  };
  try {
    if (editingId) {
      await updateDoc(doc(db, "songs", editingId), data);
    } else {
      await addDoc(collection(db, "songs"), { ...data, createdAt: serverTimestamp() });
    }
    window.closeSongModal();
  } catch (err) {
    alert('Error al guardar: ' + err.message);
  }
};

window.editSong = (id) => {
  const song = songs.find(s => s.id === id);
  if (song) window.openSongModal(song);
};

window.deleteSong = async (id) => {
  if (!isAdmin) return;
  const song = songs.find(s => s.id === id);
  if (confirm(`¿Eliminar "${song.title}"?`)) {
    try { await deleteDoc(doc(db, "songs", id)); }
    catch (err) { alert('Error al eliminar: ' + err.message); }
  }
};

// ===== Visor letra/acordes =====
window.viewLyrics = (id) => {
  const song = songs.find(s => s.id === id);
  if (!song) return;
  currentModalSong = song;

  document.getElementById('lyricsTitle').textContent = song.title;
  const subtitleParts = [];
  if (song.artist) subtitleParts.push(song.artist);
  if (song.singer) subtitleParts.push(`🎙️ ${song.singer}`);
  document.getElementById('lyricsArtist').textContent = subtitleParts.join(' · ');
  document.getElementById('lyricsNotes').textContent = song.notes || '';

  // Elegir vista inicial: letra si hay, si no acordes
  currentModalView = song.lyrics ? 'lyrics' : (song.chords ? 'chords' : 'lyrics');
  updateViewTabs();

  // Mostrar u ocultar tabs según qué tenga
  const tabs = document.getElementById('viewTabs');
  const hasLyrics = !!song.lyrics;
  const hasChords = !!song.chords;
  tabs.style.display = (hasLyrics && hasChords) ? 'flex' : 'none';

  const playBtn = document.getElementById('lyricsPlayBtn');
  if (song.playUrl) {
    playBtn.style.display = 'inline-flex';
    playBtn.onclick = () => window.playUrl(song.playUrl);
  } else {
    playBtn.style.display = 'none';
  }
  document.getElementById('lyricsModal').classList.add('active');
};

function updateViewTabs() {
  document.querySelectorAll('.view-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === currentModalView);
  });
  const content = document.getElementById('lyricsContent');
  if (currentModalView === 'chords') {
    content.classList.add('mono');
    content.textContent = currentModalSong.chords || 'Sin acordes.';
  } else {
    content.classList.remove('mono');
    content.textContent = currentModalSong.lyrics || 'Sin letra.';
  }
}

document.querySelectorAll('.view-tab').forEach(t => {
  t.addEventListener('click', () => {
    currentModalView = t.dataset.view;
    updateViewTabs();
  });
});

window.closeLyricsModal = () => {
  document.getElementById('lyricsModal').classList.remove('active');
};

// ===== MODO PANTALLA COMPLETA =====
window.openFullscreen = async () => {
  if (!currentModalSong) return;
  const song = currentModalSong;
  document.getElementById('fsTitle').textContent = song.title;
  const subtitleParts = [];
  if (song.artist) subtitleParts.push(song.artist);
  if (song.singer) subtitleParts.push(`🎙️ ${song.singer}`);
  if (song.notes) subtitleParts.push(song.notes);
  document.getElementById('fsSubtitle').textContent = subtitleParts.join(' · ');

  // Mostrar/ocultar toggle según disponibilidad
  const toggle = document.getElementById('fsViewToggle');
  const hasLyrics = !!song.lyrics;
  const hasChords = !!song.chords;
  toggle.style.display = (hasLyrics && hasChords) ? 'flex' : 'none';

  currentFsView = currentModalView;
  updateFsView();

  document.getElementById('fullscreenViewer').classList.add('active');
  document.body.style.overflow = 'hidden';

  // Intentar mantener pantalla encendida (útil al usarlo en el toque)
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) { /* silencioso, algunos navegadores lo bloquean */ }
  }
};

function updateFsView() {
  const content = document.getElementById('fullscreenContent');
  document.querySelectorAll('#fsViewToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === currentFsView);
  });
  if (currentFsView === 'chords') {
    content.classList.add('mono');
    content.style.fontSize = (fsFontSize - 2) + 'px';
    content.textContent = currentModalSong.chords || '';
    if (!currentModalSong.chords) {
      content.innerHTML = '<div class="fullscreen-empty">Esta canción no tiene acordes registrados.</div>';
    }
  } else {
    content.classList.remove('mono');
    content.style.fontSize = fsFontSize + 'px';
    content.textContent = currentModalSong.lyrics || '';
    if (!currentModalSong.lyrics) {
      content.innerHTML = '<div class="fullscreen-empty">Esta canción no tiene letra registrada.</div>';
    }
  }
}

document.querySelectorAll('#fsViewToggle button').forEach(b => {
  b.addEventListener('click', () => {
    currentFsView = b.dataset.view;
    updateFsView();
  });
});

window.changeFontSize = (delta) => {
  fsFontSize = Math.max(12, Math.min(48, fsFontSize + delta));
  updateFsView();
};

window.closeFullscreen = async () => {
  document.getElementById('fullscreenViewer').classList.remove('active');
  document.body.style.overflow = '';
  if (wakeLock) {
    try { await wakeLock.release(); } catch(e) {}
    wakeLock = null;
  }
};

// Reanudar wake lock si la pestaña pierde y recupera foco
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' &&
      document.getElementById('fullscreenViewer').classList.contains('active') &&
      'wakeLock' in navigator && !wakeLock) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
});

window.playUrl = (url) => window.open(url, '_blank', 'noopener');

// Eventos UI
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentFilter = t.dataset.filter;
    renderSongs();
  });
});

document.getElementById('searchInput').addEventListener('input', renderSongs);
document.getElementById('singerFilter').addEventListener('change', renderSongs);

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('fullscreenViewer').classList.contains('active')) {
      window.closeFullscreen();
    } else {
      document.querySelectorAll('.modal-overlay').forEach(o => o.classList.remove('active'));
    }
  }
});

renderAuthArea();
</script>
</body>
</html>
